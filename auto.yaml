variables:
  GITLAB_TOKEN:                  "${GITLAB_TOKEN}"
  GITLAB_GROUP:                  "${GITLAB_GROUP}"
  DEFAULT_BRANCH:                "${DEFAULT_BRANCH:-main}"
  BUNDLE_WINDOW:                 "${BUNDLE_WINDOW:-0500}"
  INTRA_LAYER_THRESHOLD_SECONDS: "${INTRA_LAYER_THRESHOLD_SECONDS:-120}"
  LAYERS_FILE:                   "${LAYERS_FILE:-layers.yml}"

# ── Stage 1: generate ─────────────────────────────────────────────────────────
generate-yaml:
  stage: generate
  tags: [shell]
  script:
    - |
      set -euo pipefail

      # ── Determine window boundaries from BUNDLE_WINDOW ──────────────────────
      # Passed as environment variables to the Python script.
      case "${BUNDLE_WINDOW}" in
        "0500") PREV_WINDOW="1300"; PREV_DAY_OFFSET="-1" ;;
        "0900") PREV_WINDOW="0500"; PREV_DAY_OFFSET="0"  ;;
        "1300") PREV_WINDOW="0900"; PREV_DAY_OFFSET="0"  ;;
        *)
          echo "ERROR: Unrecognised BUNDLE_WINDOW '${BUNDLE_WINDOW}'"
          exit 1
          ;;
      esac

      echo "Bundle window  : ${BUNDLE_WINDOW}"
      echo "Previous window: ${PREV_WINDOW} (day offset: ${PREV_DAY_OFFSET})"
      echo "Threshold      : ${INTRA_LAYER_THRESHOLD_SECONDS}s"
      echo "Layers file    : ${LAYERS_FILE}"

      python3 generate_yaml.py \
        --bundle-window          "${BUNDLE_WINDOW}" \
        --prev-window            "${PREV_WINDOW}" \
        --prev-day-offset        "${PREV_DAY_OFFSET}" \
        --layers-file            "${LAYERS_FILE}" \
        --gitlab-group           "${GITLAB_GROUP}" \
        --default-branch         "${DEFAULT_BRANCH}" \
        --threshold              "${INTRA_LAYER_THRESHOLD_SECONDS}" \
        --output-dir             "windows"

      # ── Verify expected outputs were produced ───────────────────────────────
      if [ ! -f yaml.env ]; then
        echo "ERROR: generate_yaml.py did not produce yaml.env"
        exit 1
      fi
      cat yaml.env

  artifacts:
    paths:
      - windows/
    reports:
      dotenv: yaml.env
    expire_in: 7d

# ── Stage 2: commit ───────────────────────────────────────────────────────────
commit-yaml-yaml:
  stage: commit
  tags: [shell]
  needs: [generate-yaml-yaml]
  script:
    - |
      set -euo pipefail

      git remote set-url origin \
        "https://oauth2:${GITLAB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
      git fetch origin "${DEFAULT_BRANCH}"
      git checkout "${DEFAULT_BRANCH}"
      git add windows/

      if git diff --cached --quiet; then
        echo "No changes to commit — window produced no new entries"
        exit 0
      fi

      git -c user.email="cicd@internal" \
          -c user.name="CI/CD" \
          commit -m "chore: ${WINDOW_LABEL} — ${TOTAL_STAGES} stages, ${TOTAL_JOBS} jobs"

      git push origin "${DEFAULT_BRANCH}"
      echo "Committed and pushed: ${WINDOW_LABEL}"

# ── Stage 3: release ──────────────────────────────────────────────────────────
create-gitlab-release:
  stage: release
  tags: [shell]
  needs: [commit-yaml]
  script:
    - |
      set -euo pipefail

      TAG="yaml-${WINDOW_LABEL}"
      echo "Creating release: ${TAG}"

      # Create git tag (|| true — tag may already exist on retry)
      curl -fsSL --request POST \
        --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
        --header "Content-Type: application/json" \
        --data "{\"tag_name\":\"${TAG}\",\"ref\":\"${DEFAULT_BRANCH}\"}" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/repository/tags" || true

      # Create GitLab Release on that tag
      HTTP_STATUS=$(curl -s -o /tmp/release_response.json -w "%{http_code}" \
        --request POST \
        --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
        --header "Content-Type: application/json" \
        --data "{
          \"name\":        \"yaml ${WINDOW_LABEL}\",
          \"tag_name\":    \"${TAG}\",
          \"description\": \"Window: ${BUNDLE_WINDOW} | Stages: ${TOTAL_STAGES} | Jobs: ${TOTAL_JOBS} | Date: ${MANIFEST_DATE}\"
        }" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases")

      if [ "${HTTP_STATUS}" != "201" ] && [ "${HTTP_STATUS}" != "200" ]; then
        echo "WARNING: Release creation returned HTTP ${HTTP_STATUS}"
        cat /tmp/release_response.json
      else
        echo "Release created: ${TAG}"
      fi
